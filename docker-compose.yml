version: "3.9"

services:
  db:
    image: postgres:17-alpine
    container_name: contratosia-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: contratosia
      POSTGRES_PASSWORD: contratosia123
      POSTGRES_DB: contratosia
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contratosia"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
